<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font Awesome Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind Link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>TechWave</title>
  </head>
  <body class="font-[Inter]">
    <header class="bg-[#1B0B2F] pb-[90px]">
      <nav
        class="flex items-center justify-between max-w-[1600px] mx-auto px-[12%] h-[92px]"
      >
        <div>
          <img
            class="sm:h-[32px] h-[25px] cursor-pointer"
            src="images/TechWave.png"
            alt="Logo"
          />
        </div>
        <div class="hidden md:block">
          <ul class="flex gap-5 text-base text-white font-medium">
            <li
              class="cursor-pointer hover:bg-[#B102E3] px-[20px] py-[8px] rounded-md"
            >
              About
            </li>
            <li
              class="cursor-pointer hover:bg-[#B102E3] px-[20px] py-[8px] rounded-md"
            >
              Episodes
            </li>
            <li
              class="cursor-pointer hover:bg-[#B102E3] px-[20px] py-[8px] rounded-md"
            >
              Host
            </li>
          </ul>
        </div>
        <div>
          <div class="hidden md:block">
            <button
              class="font-medium text-white py-[12px] rounded-full px-[16px] bg-[linear-gradient(47.64deg,#F7E93F,#FB09B4,#9100F8)] hover:bg-[linear-gradient(47.64deg,#9100F8,#FB09B4,#F7E93F)] cursor-pointer"
            >
              Subscribe <i class="fa-solid fa-arrow-right"></i>
            </button>
          </div>
          <div class="sm:hidden">
            <img src="images/hamburger-menu.png" alt="" />
          </div>
        </div>
      </nav>
      <div
        class="max-w-[1600px] mx-auto bg-[url(images/hero-bg.png)] bg-contain bg-center bg-no-repeat pt-[90px] sm:pt-[0px]"
      >
        <div
          class="bg-[url(images/hero-circle.png)] bg-center bg-no-repeat bg-contain h-[200px] w-[200px] sm:h-[350px] sm:w-[350px] mx-auto flex items-center justify-center relative"
        >
          <img
            class="h-[80px] sm:h-[200px]"
            src="images/microphone.png"
            alt=""
          />
          <div
            class="bg-[#00FF88] font-semibold px-[16px] py-[8px] rounded-full absolute top-0 right-0 sm:top-[15px]"
          >
            NEW
          </div>
        </div>
        <h1
          class="mt-[20px] mb-[12px] text-white text-4xl font-bold text-center"
        >
          TechWave
        </h1>
        <p class="text-center font-normal text-white/80 px-[10px] mb-[20px]">
          Your daily dose of tech insights, productivity hacks, and personal
          growth
        </p>
      </div>
      <div class="max-w-[1600px] mx-auto">
        <div class="text-center">
          <button
            class="text-white px-[20px] py-[12px] bg-[linear-gradient(47.64deg,#F7E93F,#FB09B4,#9100F8)] hover:bg-[linear-gradient(47.64deg,#FB09B4,#FB09B4,#F7E93F)] rounded-full mr-[8px]"
          >
            <i class="fa-brands fa-spotify"></i> Listen on Spotify
          </button>
          <button
            class="text-[#00FF88] px-[20px] py-[12px] border-[#00FF88] border-1 rounded-full hover:text-white hover:border-transparent hover:bg-[#B102E3] mt-[20px]"
          >
            <i class="fa-regular fa-envelope"></i> Subscribe
          </button>
        </div>
      </div>
    </header>
    <main></main>
    <footer></footer>
  </body>
</html>
